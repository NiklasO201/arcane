<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.R.C.A.N.E. 3D Full</title>
<style>
body { font-family: Arial; background:#1e1e2f; color:#eee; margin:0; padding:0; }
#chatbox { width:90%; max-width:600px; margin:10px auto; display:flex; flex-direction:column; gap:5px; }
.message { background:#2c2c44; padding:8px; border-radius:5px; }
#inputRow { display:flex; gap:5px; width:90%; max-width:600px; margin:10px auto; }
input, button { padding:8px; border-radius:5px; border:none; font-size:14px; flex:1; }
canvas { width:100%; height:400px; display:block; margin-top:20px; border:1px solid #555; }
</style>
</head>
<body>

<h1>A.R.C.A.N.E. 3D Full</h1>
<div id="chatbox"></div>
<div id="inputRow">
<input type="text" id="userInput" placeholder="Nachricht an ARCANE">
<button id="sendBtn">Senden</button>
</div>

<canvas id="scene"></canvas>
<audio id="voicePlayer" autoplay></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script>
const SERVER_URL="https://arcane-production-61f1.up.railway.app";
const chatbox=document.getElementById("chatbox");
const input=document.getElementById("userInput");
const sendBtn=document.getElementById("sendBtn");
const voicePlayer=document.getElementById("voicePlayer");

function addMessage(text,sender="A.R.C.A.N.E.") {
    const div=document.createElement("div");
    div.className="message";
    div.textContent=`${sender}: ${text}`;
    chatbox.appendChild(div);
    chatbox.scrollTop=chatbox.scrollHeight;
}

async function sendMessage(text){
    if(!text) return;
    addMessage(text,"Du");

    const res=await fetch(`${SERVER_URL}/chat`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({messages:[{role:"user",content:text}]})
    });
    const data=await res.json();
    addMessage(data.reply);

    const speakRes=await fetch(`${SERVER_URL}/speak`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({voice_id:"buUrS4YSeOZtlCKnzwkC",payload:{text:data.reply}})
    });
    const audioBlob=await speakRes.blob();
    voicePlayer.src=URL.createObjectURL(audioBlob);
}

sendBtn.addEventListener("click",()=>{sendMessage(input.value);input.value="";});
input.addEventListener("keypress",e=>{if(e.key==="Enter"){sendMessage(input.value);input.value="";}});

// Kamera aktivieren
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
    const video=document.createElement('video');
    video.srcObject=stream;
    video.play();
    document.body.appendChild(video); // optional sichtbar
});

// Always-on Sprachsteuerung
if('webkitSpeechRecognition' in window){
    const recognition=new webkitSpeechRecognition();
    recognition.continuous=true;
    recognition.interimResults=false;
    recognition.lang="de-DE";
    recognition.onresult=function(event){
        for(let i=event.resultIndex;i<event.results.length;i++){
            const transcript=event.results[i][0].transcript.toLowerCase();
            if(transcript.includes("arcane")){
                sendMessage("arcane");
            }
        }
    };
    recognition.start();
}

// Three.js Canvas
const canvas=document.getElementById("scene");
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,canvas.clientWidth/canvas.clientHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas});
renderer.setSize(canvas.clientWidth,canvas.clientHeight);
camera.position.z=5;

const geometry=new THREE.BoxGeometry();
const material=new THREE.MeshBasicMaterial({color:0x00ff00});
const cube=new THREE.Mesh(geometry,material);
cube.name="Teil1";
scene.add(cube);

function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);}
animate();
</script>
</body>
</html>
