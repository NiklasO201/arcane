<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.R.C.A.N.E. 3D Full</title>
<style>
/* Design nach deinem Screenshot */
body { font-family: Arial, sans-serif; background:#1e1e2f; color:#eee; margin:0; padding:0; }
header { background:#2c2c44; padding:10px; text-align:center; font-size:24px; font-weight:bold; color:#00ffcc; }
#container { display:flex; height:calc(100vh - 50px); }
#sidebar { width:250px; background:#2c2c44; padding:10px; display:flex; flex-direction:column; gap:10px; overflow-y:auto; }
#chatbox { flex:1; display:flex; flex-direction:column; gap:5px; overflow-y:auto; background:#1e1e2f; padding:10px; border-radius:5px; }
.message { background:#3a3a5a; padding:8px; border-radius:5px; }
#inputRow { display:flex; gap:5px; margin-top:5px; }
input, button { padding:8px; border-radius:5px; border:none; font-size:14px; flex:1; }
canvas { flex:2; border:1px solid #555; margin:10px; background:#111; }
button.menuBtn { background:#00ffcc; color:#1e1e2f; font-weight:bold; cursor:pointer; }
button.menuBtn:hover { background:#00ddaa; }
</style>
</head>
<body>
<header>A.R.C.A.N.E. 3D Full</header>
<div id="container">
  <div id="sidebar">
    <button class="menuBtn" onclick="switchPanel('chat')">Chat</button>
    <button class="menuBtn" onclick="switchPanel('notes')">Notizen</button>
    <button class="menuBtn" onclick="switchPanel('rem')">Erinnerungen</button>
    <button class="menuBtn" onclick="switchPanel('arch')">Archiv</button>
    <p id="status">Status: Bereit</p>
  </div>
  <div style="flex:3; display:flex; flex-direction:column;">
    <div id="chatbox"></div>
    <div id="inputRow">
      <input type="text" id="userInput" placeholder="Nachricht an ARCANE">
      <button id="sendBtn">Senden</button>
    </div>
    <canvas id="scene"></canvas>
    <audio id="voicePlayer" autoplay></audio>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script>
const SERVER_URL="https://arcane-production-61f1.up.railway.app";

const chatbox=document.getElementById("chatbox");
const input=document.getElementById("userInput");
const sendBtn=document.getElementById("sendBtn");
const voicePlayer=document.getElementById("voicePlayer");
const statusEl=document.getElementById("status");

function addMessage(text,sender="A.R.C.A.N.E.") {
    const div=document.createElement("div");
    div.className="message";
    div.textContent=`${sender}: ${text}`;
    chatbox.appendChild(div);
    chatbox.scrollTop=chatbox.scrollHeight;
}

async function sendMessage(text){
    if(!text) return;
    addMessage(text,"Du");
    try{
        const res=await fetch(`${SERVER_URL}/chat`,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({messages:[{role:"user",content:text}]})
        });
        const data=await res.json();
        addMessage(data.reply);
    } catch(err){
        addMessage("Fehler: Backend nicht erreichbar","System");
    }
}

sendBtn.addEventListener("click",()=>{sendMessage(input.value);input.value="";});
input.addEventListener("keypress",e=>{if(e.key==="Enter"){sendMessage(input.value);input.value="";}});

function switchPanel(panel){
    addMessage("Panel gewechselt: "+panel,"System");
}

// Kamera
navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
    const video=document.createElement('video');
    video.srcObject=stream;
    video.play();
    document.body.appendChild(video);
});

// Wake Word Sprachsteuerung
if('webkitSpeechRecognition' in window){
    const recognition=new webkitSpeechRecognition();
    recognition.continuous=true;
    recognition.interimResults=false;
    recognition.lang="de-DE";
    recognition.onresult=function(event){
        for(let i=event.resultIndex;i<event.results.length;i++){
            const transcript=event.results[i][0].transcript.toLowerCase();
            if(transcript.includes("arcane")){
                sendMessage("arcane");
            }
        }
    };
    recognition.start();
}

// Three.js Canvas Setup
const canvas=document.getElementById("scene");
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,canvas.clientWidth/canvas.clientHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas});
renderer.setSize(canvas.clientWidth,canvas.clientHeight);
camera.position.z=5;

const geometry=new THREE.BoxGeometry();
const material=new THREE.MeshBasicMaterial({color:0x00ff00});
const cube=new THREE.Mesh(geometry,material);
cube.name="Karosserie";
scene.add(cube);

function animate(){requestAnimationFrame(animate);renderer.render(scene,camera);}
animate();

// Beispiel: Sprachbefehle für Mesh-Interaktion
function toggleMesh(name, visible){
    scene.traverse(obj=>{
        if(obj.name===name) obj.visible=visible;
    });
}
</script>
</body>
</html>
