<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>A.R.C.A.N.E. 3D Full</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; font-family: Arial, sans-serif; background-color: #0b0c1d; color: #00f3ff; }
  #container { width: 100%; height: 100%; position: relative; }
  #chat-panel { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.6); display: flex; }
  #chat-input { flex: 1; padding: 10px; font-size: 16px; background: #111; color: #0ff; border: none; }
  #chat-send { padding: 10px; background: #00f3ff; color: #000; border: none; cursor: pointer; }
  #panels { position: absolute; top: 0; left: 0; width: 200px; height: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; justify-content: start; padding-top: 20px; }
  .panel-btn { margin: 10px; padding: 10px; background: #111; color: #0ff; cursor: pointer; text-align: center; }
  canvas { display: block; }
</style>
</head>
<body>
<div id="container"></div>
<div id="panels">
  <div class="panel-btn" onclick="switchPanel('chat')">KOMM</div>
  <div class="panel-btn" onclick="switchPanel('notes')">NOTIZ</div>
  <div class="panel-btn" onclick="switchPanel('rem')">ALARM</div>
  <div class="panel-btn" onclick="switchPanel('arch')">ARCHIV</div>
</div>
<div id="chat-panel">
  <input id="chat-input" placeholder="Befehl eingeben..." />
  <button id="chat-send">Senden</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script>
// ---------- 3D Mesh Background ----------
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
camera.position.z = 600;

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('container').appendChild(renderer.domElement);

let points = [];
let geometry = new THREE.BufferGeometry();
let vertices = [];

const pointCount = 80;
for(let i=0;i<pointCount;i++){
  let x = Math.random()*1200-600;
  let y = Math.random()*800-400;
  let z = Math.random()*800-400;
  vertices.push(x,y,z);
  points.push(new THREE.Vector3(x,y,z));
}

geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices,3));

let material = new THREE.PointsMaterial({color:0x00f3ff, size:3});
let pointCloud = new THREE.Points(geometry, material);
scene.add(pointCloud);

let lineMaterial = new THREE.LineBasicMaterial({color:0x00f3ff, opacity:0.3, transparent:true});
let lines = new THREE.Group();
scene.add(lines);

function updateLines(){
  lines.clear();
  for(let i=0;i<points.length;i++){
    for(let j=i+1;j<points.length;j++){
      if(points[i].distanceTo(points[j])<150){
        let lineGeo = new THREE.BufferGeometry().setFromPoints([points[i],points[j]]);
        let line = new THREE.Line(lineGeo, lineMaterial);
        lines.add(line);
      }
    }
  }
}

function animate(){
  requestAnimationFrame(animate);
  pointCloud.rotation.y += 0.001;
  pointCloud.rotation.x += 0.0005;
  updateLines();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- Chat + Panels ----------
const BACKEND_URL = "https://arcane-production-61f1.up.railway.app";
let panel = 'chat';

function switchPanel(p){ panel=p; console.log("Switched to panel:",p); }

// Chat
document.getElementById('chat-send').onclick = async ()=>{
  let input = document.getElementById('chat-input').value;
  if(!input) return;
  const resp = await fetch(`${BACKEND_URL}/chat`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({messages:[{role:'user',content:input}]})
  });
  const data = await resp.json();
  alert("A.R.C.A.N.E.: " + data.reply);
  document.getElementById('chat-input').value='';
}

// ---------- Wake Word ----------
window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = new SpeechRecognition();
recognition.continuous = true;
recognition.lang = 'de-DE';
recognition.onresult = (event)=>{
  const transcript = event.results[event.results.length-1][0].transcript.trim();
  if(transcript.toLowerCase().includes("arcane")) alert("Wake Word erkannt!");
}
recognition.start();

</script>
</body>
</html>
