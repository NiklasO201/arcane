<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.R.C.A.N.E.</title>
<style>
body { font-family: Arial, sans-serif; background: #1e1e2f; color: #eee; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 20px; }
#chatbox { width: 90%; max-width: 600px; margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
.message { background: #2c2c44; padding: 10px; border-radius: 8px; }
input, button { padding: 10px; border-radius: 5px; border: none; font-size: 16px; }
input { flex: 1; }
#inputRow { display: flex; gap: 10px; margin-top: 10px; }
</style>
</head>
<body>

<h1>A.R.C.A.N.E.</h1>
<div id="chatbox"></div>

<div id="inputRow">
  <input type="text" id="userInput" placeholder="Nachricht an A.R.C.A.N.E.">
  <button id="sendBtn">Senden</button>
</div>

<audio id="voicePlayer" autoplay></audio>

<script>
const SERVER_URL = "https://arcane-production-61f1.up.railway.app";
const chatbox = document.getElementById("chatbox");
const input = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const voicePlayer = document.getElementById("voicePlayer");

function addMessage(text, sender="A.R.C.A.N.E.") {
    const div = document.createElement("div");
    div.className = "message";
    div.textContent = `${sender}: ${text}`;
    chatbox.appendChild(div);
    chatbox.scrollTop = chatbox.scrollHeight;
}

async function sendMessage(text) {
    if(!text) return;
    addMessage(text, "Du");

    // Chat request
    const res = await fetch(`${SERVER_URL}/chat`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({messages:[{role:"user", content:text}]})
    });
    const data = await res.json();
    addMessage(data.reply);

    // Speak request
    const speakRes = await fetch(`${SERVER_URL}/speak`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            voice_id: "buUrS4YSeOZtlCKnzwkC",
            payload: {text: data.reply}
        })
    });
    const audioBlob = await speakRes.blob();
    const audioURL = URL.createObjectURL(audioBlob);
    voicePlayer.src = audioURL;
}

// Button / Enter
sendBtn.addEventListener("click", () => { sendMessage(input.value); input.value=""; });
input.addEventListener("keypress", e => { if(e.key==="Enter"){ sendMessage(input.value); input.value=""; }});

// Always-on Speech Recognition
if('webkitSpeechRecognition' in window){
    const recognition = new webkitSpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.lang = "de-DE";
    recognition.onresult = function(event){
        for(let i=event.resultIndex;i<event.results.length;i++){
            const transcript = event.results[i][0].transcript.toLowerCase();
            if(transcript.includes("arcane")){ sendMessage("arcane"); }
        }
    };
    recognition.start();
} else {
    console.warn("Spracherkennung wird von diesem Browser nicht unterstützt.");
}

</script>
</body>
</html>
