<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>A.R.C.A.N.E.</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;900&family=Exo+2:wght@200;300&display=swap" rel="stylesheet">
<style>
:root {
  --void: #00000c;
  --sidebar-bg: #00050f;
  --border: rgba(0,200,255,0.15);
  --border-bright: rgba(0,200,255,0.4);
  --accent: #00d8ff;
  --accent-glow: rgba(0,216,255,0.15);
  --text: #4aa8c4;
  --text-bright: #c0ecff;
  --text-dim: #0d2535;
  --red: #ff2244;
  --green: #00ff88;
  --sw: 76px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:var(--void); color:var(--text); font-family:'Share Tech Mono',monospace; height:100vh; overflow:hidden; cursor:none; }
#cursor { position:fixed; width:6px; height:6px; background:var(--accent); border-radius:50%; pointer-events:none; z-index:9999; box-shadow:0 0 10px var(--accent); transform:translate(-3px,-3px); }
#cursor-ring { position:fixed; width:24px; height:24px; border:1px solid rgba(0,216,255,0.3); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-12px,-12px); transition:left 0.08s,top 0.08s; }
#loader { position:fixed; bottom:0; left:var(--sw); right:0; height:1px; background:var(--accent); box-shadow:0 0 10px var(--accent); width:0%; transition:width 0.3s; z-index:200; }

/* SIDEBAR */
#sidebar {
  position:fixed; left:0; top:0; bottom:0; width:var(--sw);
  background:var(--sidebar-bg);
  border-right:1px solid var(--border-bright);
  display:flex; flex-direction:column; align-items:center;
  padding:16px 0; gap:2px; z-index:100;
}
#sb-logo {
  font-family:'Orbitron',monospace; font-size:11px; font-weight:900;
  color:var(--accent); letter-spacing:0.08em;
  text-shadow:0 0 16px var(--accent);
  margin-bottom:16px; writing-mode:vertical-rl; transform:rotate(180deg);
}
.nav-btn {
  width:54px; height:54px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:4px;
  border:1px solid var(--border); border-radius:4px;
  cursor:pointer; transition:all 0.2s; color:var(--text);
  margin:2px 0;
}
.nav-btn:hover, .nav-btn.on {
  border-color:var(--accent); background:var(--accent-glow);
  color:var(--accent); box-shadow:0 0 12px var(--accent-glow);
}
.nav-btn svg { width:20px; height:20px; }
.nav-lbl { font-size:7px; letter-spacing:0.15em; }
#sb-foot { margin-top:auto; display:flex; flex-direction:column; align-items:center; gap:8px; padding-bottom:4px; }
#online-dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 10px var(--green); animation:gp 2.5s ease-in-out infinite; }
@keyframes gp{0%,100%{opacity:1}50%{opacity:0.3}}
#sb-time { font-size:9px; letter-spacing:0.08em; color:var(--text); }

/* MAIN */
#main { position:fixed; left:var(--sw); top:0; right:0; bottom:0; display:flex; flex-direction:column; }

/* HEADER */
#hdr {
  height:52px; display:flex; align-items:center;
  justify-content:space-between; padding:0 20px;
  border-bottom:1px solid var(--border-bright); flex-shrink:0;
  background:rgba(0,5,15,0.8);
}
#hdr-logo { font-family:'Orbitron',monospace; font-size:15px; font-weight:600; letter-spacing:0.5em; color:var(--accent); text-shadow:0 0 20px var(--accent); }
.hbadge { font-size:8px; letter-spacing:0.18em; color:var(--text); border:1px solid var(--border); padding:3px 8px; }
#status { display:flex; align-items:center; gap:6px; font-size:8px; letter-spacing:0.18em; color:var(--accent); }
#sdot { width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); animation:bl 2s ease-in-out infinite; }
@keyframes bl{0%,100%{opacity:1}50%{opacity:0.1}}

/* CONTENT */
#content { flex:1; position:relative; overflow:hidden; }
#cw { position:absolute; inset:0; z-index:1; cursor:pointer; }
canvas { width:100%; height:100%; display:block; }

/* Corner marks */
.cm { position:absolute; width:16px; height:16px; z-index:3; }
.cm::before,.cm::after { content:''; position:absolute; background:var(--border-bright); }
.cm::before { width:100%; height:1px; top:0; left:0; }
.cm::after { width:1px; height:100%; top:0; left:0; }
.tl{top:8px;left:8px} .tr{top:8px;right:8px;transform:scaleX(-1)}
.bl{bottom:8px;left:8px;transform:scaleY(-1)} .br{bottom:8px;right:8px;transform:scale(-1)}

/* Welcome */
#welcome { position:absolute; inset:0; z-index:5; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; pointer-events:none; transition:opacity 0.5s; }
#welcome.gone{opacity:0}
#wt { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:0.35em; color:rgba(0,200,255,0.35); text-align:center; line-height:2.4; }
#ws { font-size:9px; letter-spacing:0.2em; color:rgba(0,200,255,0.2); animation:fp 2.5s ease-in-out infinite; }
@keyframes fp{0%,100%{opacity:0.2}50%{opacity:0.7}}

/* Panels */
.panel { position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; padding:22px; opacity:0; pointer-events:none; transition:opacity 0.35s; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
.panel.on { opacity:1; pointer-events:auto; }
.panel::-webkit-scrollbar{width:2px} .panel::-webkit-scrollbar-thumb{background:var(--accent-glow)}
.ph { font-family:'Orbitron',monospace; font-size:9px; letter-spacing:0.4em; color:var(--accent); margin-bottom:18px; display:flex; align-items:center; gap:10px; }
.ph::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--border-bright),transparent); }

/* Chat */
#panel-chat { background:transparent; }
#chat { flex:1; display:flex; flex-direction:column; gap:16px; overflow-y:auto; padding-bottom:8px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
#chat::-webkit-scrollbar{width:2px} #chat::-webkit-scrollbar-thumb{background:var(--accent-glow)}
.msg { display:flex; flex-direction:column; gap:4px; animation:mi 0.3s ease-out; }
@keyframes mi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.mm { font-size:8px; letter-spacing:0.28em; color:var(--text-dim); display:flex; align-items:center; gap:8px; }
.mm::after{content:'';flex:1;height:1px;background:rgba(0,200,255,0.08)}
.msg.arc .mm{color:var(--accent)} .msg.arc .mm::after{background:rgba(0,200,255,0.2)}
.mb { font-size:13px; line-height:1.75; color:var(--text); padding:9px 0 9px 12px; border-left:1px solid rgba(255,255,255,0.06); font-family:'Exo 2',sans-serif; font-weight:300; }
.msg.arc .mb{color:var(--text-bright);border-left-color:rgba(0,200,255,0.25)}
#thinking { display:none; align-items:center; gap:5px; font-size:9px; letter-spacing:0.18em; color:var(--text-dim); padding:7px 0 7px 12px; border-left:1px solid var(--border); }
#thinking.on{display:flex}
.td{width:4px;height:4px;border-radius:50%;background:var(--text-dim);animation:th 1.2s ease-in-out infinite;}
.td:nth-child(2){animation-delay:0.2s}.td:nth-child(3){animation-delay:0.4s}
@keyframes th{0%,100%{opacity:0.2;transform:scale(0.8)}50%{opacity:1;transform:scale(1);background:var(--accent)}}

/* Data panels */
#panel-notes,#panel-rem,#panel-arch { background:rgba(0,5,15,0.85); }
.card { border:1px solid var(--border); padding:12px 15px; margin-bottom:8px; font-size:12px; color:var(--text); font-family:'Exo 2',sans-serif; font-weight:300; line-height:1.6; transition:border-color 0.2s; }
.card:hover{border-color:var(--border-bright)}
.card-sub { font-size:7.5px; letter-spacing:0.15em; color:var(--text-dim); margin-top:5px; }
.card-title { font-size:9px; letter-spacing:0.2em; color:var(--accent); margin-bottom:5px; }
.rem-row { display:flex; align-items:center; gap:12px; }
.rem-time { font-family:'Orbitron',monospace; font-size:18px; color:var(--accent); min-width:60px; text-shadow:0 0 10px var(--accent); }
.empty { color:var(--text-dim); font-size:11px; padding:12px; letter-spacing:0.1em; }

/* BOTTOM */
#bot { height:62px; border-top:1px solid var(--border-bright); display:flex; align-items:center; padding:0 18px; gap:12px; flex-shrink:0; background:rgba(0,5,15,0.7); }
#ipfx { font-size:11px; color:var(--accent); letter-spacing:0.15em; white-space:nowrap; text-shadow:0 0 8px var(--accent); }
#inp { flex:1; background:transparent; border:none; outline:none; color:var(--text-bright); font-family:'Share Tech Mono',monospace; font-size:13px; caret-color:var(--accent); }
#inp::placeholder{color:rgba(0,180,255,0.2);font-size:10px}

#mic-orb:hover{border-color:var(--accent);box-shadow:0 0 16px var(--accent-glow)}
#mic-orb.listening{border-color:var(--red);box-shadow:0 0 16px rgba(255,34,68,0.35);animation:lp 0.6s ease-in-out infinite alternate}
to{transform:scale(1.07)}}


#snd { width:36px; height:36px; border:1px solid var(--border); background:transparent; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.2s; color:var(--accent); flex-shrink:0; border-radius:2px; }
#snd:hover{border-color:var(--accent);background:var(--accent-glow);box-shadow:0 0 10px var(--accent-glow)}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="loader"></div>

<div id="sidebar">
  <div id="sb-logo">ARC</div>
  <div class="nav-btn on" data-p="chat" onclick="sw('chat',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 10h8M8 14h5M5 5h14a2 2 0 012 2v9a2 2 0 01-2 2H8l-4 4V7a2 2 0 012-2z"/></svg>
    <span class="nav-lbl">KOMM</span>
  </div>
  <div class="nav-btn" data-p="notes" onclick="sw('notes',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="4" width="16" height="16" rx="1"/><path d="M8 8h8M8 12h8M8 16h4"/></svg>
    <span class="nav-lbl">NOTIZ</span>
  </div>
  <div class="nav-btn" data-p="rem" onclick="sw('rem',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    <span class="nav-lbl">ALARM</span>
  </div>
  <div class="nav-btn" data-p="arch" onclick="sw('arch',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h16M4 10h16M4 14h10"/></svg>
    <span class="nav-lbl">ARCHIV</span>
  </div>
  <div id="sb-foot">
    <div id="online-dot"></div>
    <div id="sb-time">00:00</div>
  </div>
</div>

<div id="main">
  <div id="hdr">
    <div id="hdr-logo">A.R.C.A.N.E.</div>
    <div style="display:flex;align-items:center;gap:14px">
      <span class="hbadge">NATURAL EXECUTION</span>
      <div id="status"><div id="sdot"></div><span>OPERATIONAL</span></div>
    </div>
  </div>
  <div id="content">
    <div class="cm tl"></div><div class="cm tr"></div>
    <div class="cm bl"></div><div class="cm br"></div>
    <div id="cw"><canvas id="c"></canvas></div>
    <div id="welcome">
      <div id="wt">ARTIFICIAL REASONING<br>& COGNITIVE ASSISTANT<br>FOR NATURAL EXECUTION</div>
      <div id="ws">MESH BERUEHREN · SPRECHEN · EINGEBEN</div>
    </div>
    <div class="panel on" id="panel-chat">
      <div id="chat"></div>
      <div id="thinking"><div class="td"></div><div class="td"></div><div class="td"></div><span>VERARBEITUNG</span></div>
    </div>
    <div class="panel" id="panel-notes">
      <div class="ph">NOTIZEN</div>
      <div id="nl"></div>
    </div>
    <div class="panel" id="panel-rem">
      <div class="ph">ERINNERUNGEN</div>
      <div id="rl"></div>
    </div>
    <div class="panel" id="panel-arch">
      <div class="ph">ARCHIV</div>
      <div id="al"></div>
    </div>
  </div>
  <div id="bot">
    <span id="ipfx">&gt; SIR:</span>
    <input id="inp" type="text" placeholder="Befehl eingeben..." autocomplete="off" spellcheck="false"/>
    <div id="snd" onclick="send()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="15" height="15"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </div>
  </div>
</div>

<script>
const SRV='https://arcane-production-61f1.up.railway.app';
const VID='buUrS4YSeOZtlCKnzwkC';
const hist=[];
let mr=null,ac=[],rec=false,spk=false;

// Cursor
const cur=document.getElementById('cursor'),crg=document.getElementById('cursor-ring');
let rx=0,ry=0,mx=0,my=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';crg.style.left=(mx-12)+'px';crg.style.top=(my-12)+'px';});

// Time
function tick(){const n=new Date();document.getElementById('sb-time').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
tick();setInterval(tick,1000);

// Panel switch - also called by AI
function sw(id,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('panel-'+id).classList.add('on');
  if(el)el.classList.add('on');
  else{const b=document.querySelector(`[data-p="${id}"]`);if(b)b.classList.add('on');}
  if(id==='notes')loadNotes();
  if(id==='rem')loadRem();
  if(id==='arch')loadArch();
}

async function loadNotes(){
  const l=document.getElementById('nl');l.innerHTML='';
  try{const r=await fetch(`${SRV}/data/notes`);const d=await r.json();
    if(!d.length){l.innerHTML='<div class="empty">Keine Notizen vorhanden, Sir.</div>';return;}
    d.forEach(n=>{const div=document.createElement('div');div.className='card';div.innerHTML=`<div>${n.text}</div><div class="card-sub">${n.datum}</div>`;l.appendChild(div);});
  }catch{l.innerHTML='<div class="empty">Server nicht erreichbar.</div>';}
}
async function loadRem(){
  const l=document.getElementById('rl');l.innerHTML='';
  try{const r=await fetch(`${SRV}/data/reminders`);const d=await r.json();
    if(!d.length){l.innerHTML='<div class="empty">Keine Erinnerungen, Sir.</div>';return;}
    d.forEach(r=>{const div=document.createElement('div');div.className='card';div.innerHTML=`<div class="rem-row"><div class="rem-time">${r.zeit}</div><div>${r.text}${r.datum?' <span style="color:var(--text-dim)">'+r.datum+'</span>':''}</div></div>`;l.appendChild(div);});
  }catch{}
}
async function loadArch(){
  const l=document.getElementById('al');l.innerHTML='';
  try{const r=await fetch(`${SRV}/data/archive`);const d=await r.json();
    if(!d.length){l.innerHTML='<div class="empty">Archiv leer, Sir.</div>';return;}
    d.forEach(a=>{const div=document.createElement('div');div.className='card';div.innerHTML=`<div class="card-title">${a.thema}</div><div>${a.inhalt}</div><div class="card-sub">${a.datum}</div>`;l.appendChild(div);});
  }catch{}
}

// Canvas - STRONGER MESH
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,pcx,pcy,pts=[],fr=0,si=0;

function rsz(){
  W=canvas.width=canvas.offsetWidth;
  H=canvas.height=canvas.offsetHeight;
  pcx=W/2;pcy=H/2;
}
window.addEventListener('resize',()=>{rsz();initP();});rsz();

function initP(){
  pts=[];
  const count=Math.floor((W*H)/5000);
  for(let i=0;i<count;i++){
    // Scatter randomly across full canvas - NOT in a circle
    const x=80+Math.random()*(W-160);
    const y=60+Math.random()*(H-120);
    pts.push({
      x:x, y:y, ox:x, oy:y,
      vx:(Math.random()-0.5)*0.4,
      vy:(Math.random()-0.5)*0.4,
      r:0.8+Math.random()*1.8,
      b:0.4+Math.random()*0.6,
      po:Math.random()*Math.PI*2,
      // Each particle has its own drift target for organic movement
      tx:80+Math.random()*(W-160),
      ty:60+Math.random()*(H-120),
      tTimer:0
    });
  }
}
initP();

let talking=false; // true when AI is responding (typing OR speaking)

function draw(){
  ctx.clearRect(0,0,W,H);fr++;
  si=spk||talking?Math.min(si+0.04,1):Math.max(si-0.015,0);
  const base=0.5+0.5*Math.abs(Math.sin(fr*0.018));

  // Subtle background glow center
  const g=ctx.createRadialGradient(pcx,pcy,0,pcx,pcy,60+si*80+base*15);
  g.addColorStop(0,`rgba(0,190,255,${0.08+si*0.12+base*0.03})`);
  g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(pcx,pcy,60+si*80+base*15,0,Math.PI*2);ctx.fill();

  // Core dot
  ctx.shadowColor='#00d8ff';ctx.shadowBlur=10+si*20+base*5;
  ctx.beginPath();ctx.arc(pcx,pcy,2+si*3+base,0,Math.PI*2);
  ctx.fillStyle=`rgba(0,230,255,${0.8+si*0.2})`;ctx.fill();
  ctx.shadowBlur=0;

  // Update particles - organic free movement
  for(const p of pts){
    const t=fr*0.006+p.po;
    p.tTimer++;

    // Change drift target every 200-400 frames
    if(p.tTimer>200+Math.floor(p.po*100)){
      p.tx=80+Math.random()*(W-160);
      p.ty=60+Math.random()*(H-120);
      p.tTimer=0;
    }

    if(si>0.1){
      // When talking: chaotic push from center with spikes
      const dx=p.x-pcx,dy=p.y-pcy;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      const f=si*(1.0+Math.sin(t*6+p.po)*0.6);
      p.vx+=(dx/d)*f*0.12+( Math.random()-0.5)*si*1.2;
      p.vy+=(dy/d)*f*0.12+(Math.random()-0.5)*si*1.2;
    } else {
      // Normal: drift toward own target organically
      const dx=p.tx-p.x,dy=p.ty-p.y;
      p.vx+=dx*0.002;p.vy+=dy*0.002;
    }

    // Always some organic noise
    p.vx+=Math.sin(t*0.9+p.po)*0.025;
    p.vy+=Math.cos(t*0.7+p.po*1.3)*0.025;
    p.vx*=0.95;p.vy*=0.95;
    p.x+=p.vx;p.y+=p.vy;

    // Soft boundary - bounce back gently from edges
    const margin=30;
    if(p.x<margin){p.vx+=0.5;p.tx=margin+Math.random()*(W-margin*2);}
    if(p.x>W-margin){p.vx-=0.5;p.tx=margin+Math.random()*(W-margin*2);}
    if(p.y<margin){p.vy+=0.5;p.ty=margin+Math.random()*(H-margin*2);}
    if(p.y>H-margin){p.vy-=0.5;p.ty=margin+Math.random()*(H-margin*2);}
  }

  // Connections - the mesh web
  const md=100+si*50+base*10;
  for(let i=0;i<pts.length;i++){
    const pi=pts[i];
    for(let j=i+1;j<pts.length;j++){
      const pj=pts[j];
      const dx=pi.x-pj.x,dy=pi.y-pj.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<md){
        const a=(1-d/md)*0.45*pi.b*pj.b+si*0.2+base*0.04;
        ctx.strokeStyle=`rgba(0,185,255,${Math.min(a,0.85)})`;
        ctx.lineWidth=0.6+si*0.4;
        ctx.beginPath();ctx.moveTo(pi.x,pi.y);ctx.lineTo(pj.x,pj.y);ctx.stroke();
      }
    }
  }

  // Particles
  for(const p of pts){
    const pulse=0.5+0.5*Math.sin(fr*0.04+p.po);
    const a=Math.min((0.5+pulse*0.5)*p.b+si*0.3+base*0.05,1);
    const r=p.r*(1+si*0.8+pulse*0.25);
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,205,255,${a})`;
    if(pulse>0.75||si>0.1){ctx.shadowColor='#00d8ff';ctx.shadowBlur=r*2+si*4;}
    ctx.fill();ctx.shadowBlur=0;
  }

  requestAnimationFrame(draw);
}
draw();

// Click mesh = mic
document.getElementById('cw').addEventListener('click',toggleMic);

// Input
document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')send();});

function addMsg(role,text){
  const w=document.getElementById('welcome');if(w)w.classList.add('gone');
  // Switch to chat if needed
  if(!document.getElementById('panel-chat').classList.contains('on'))sw('chat',null);
  const chat=document.getElementById('chat');
  const div=document.createElement('div');div.className='msg '+(role==='assistant'?'arc':'usr');
  const m=document.createElement('div');m.className='mm';m.textContent=role==='assistant'?'A.R.C.A.N.E.':'SIR';
  const b=document.createElement('div');b.className='mb';b.textContent=text;
  div.appendChild(m);div.appendChild(b);chat.appendChild(div);chat.scrollTop=chat.scrollHeight;
}

function setThink(on){
  talking=on;
  document.getElementById('thinking').classList.toggle('on',on);
  document.getElementById('loader').style.width=on?'55%':'0%';
}

async function speak(text){
  try{spk=true;
    const r=await fetch(`${SRV}/speak`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({voice_id:VID,payload:{text,model_id:'eleven_multilingual_v2',voice_settings:{stability:0.45,similarity_boost:0.8,style:0.25,use_speaker_boost:true}}})});
    const blob=await r.blob();const url=URL.createObjectURL(blob);
    const audio=new Audio(url);audio.onended=()=>{spk=false;URL.revokeObjectURL(url);};audio.play();
  }catch{spk=false;}
}

async function toggleMic(){
  const btn=document.getElementById('mic-orb');
  if(!rec){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      mr=new MediaRecorder(stream);ac=[];
      mr.ondataavailable=e=>ac.push(e.data);
      mr.onstop=async()=>{
        const blob=new Blob(ac,{type:'audio/webm'});stream.getTracks().forEach(t=>t.stop());
        btn.classList.remove('listening');rec=false;setThink(true);
        try{const fd=new FormData();fd.append('file',blob,'audio.webm');
          const r=await fetch(`${SRV}/transcribe`,{method:'POST',body:fd});
          const d=await r.json();const t=d.text||'';
          if(t.trim()){document.getElementById('inp').value=t;await send();}else setThink(false);
        }catch{setThink(false);addMsg('assistant','Spracherkennung fehlgeschlagen, Sir.');}
      };
      mr.start();rec=true;btn.classList.add('listening');
    }catch{addMsg('assistant','Mikrofonzugriff verweigert, Sir.');}
  }else mr.stop();
}

// Auto greet on load
async function greet(){
  try{
    const r=await fetch(`${SRV}/greet`);
    const d=await r.json();
    addMsg('assistant',d.text);
    speak(d.text);
  }catch(e){}
}
window.addEventListener('load',()=>setTimeout(greet,800));

async function send(){
  const inp=document.getElementById('inp');const text=inp.value.trim();if(!text)return;
  inp.value='';addMsg('user',text);setThink(true);hist.push({role:'user',content:text});
  try{
    const r=await fetch(`${SRV}/chat`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:hist})});
    const d=await r.json();
    const rep=d.reply;
    const cmds=d.commands||[];

    // Handle panel switches
    for(const cmd of cmds){
      if(cmd.type==='switch') setTimeout(()=>sw(cmd.panel,null),600);
    }

    hist.push({role:'assistant',content:rep});
    setThink(false);addMsg('assistant',rep);
    document.getElementById('loader').style.width='100%';
    setTimeout(()=>{document.getElementById('loader').style.width='0%';},400);
    speak(rep);
  }catch{setThink(false);addMsg('assistant','Server nicht erreichbar, Sir. Bitte arcane_server.py starten.');}
}

// Wake Word Detection - "Arcane"
let wakeStream = null;
let wakeRecognition = null;

function startWakeWord() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    console.log('Wake word not supported in this browser');
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  wakeRecognition = new SR();
  wakeRecognition.continuous = true;
  wakeRecognition.interimResults = true;
  wakeRecognition.lang = 'de-DE';
  wakeRecognition.onresult = (e) => {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript.toLowerCase().trim();
      if (t.includes('arcane') || t.includes('arkane') || t.includes('arkan')) {
        if (!rec) {
          wakeRecognition.stop();
          setTimeout(() => { toggleMic(); }, 200);
        }
      }
    }
  };
  wakeRecognition.onend = () => {
    if (!rec) setTimeout(() => { try { wakeRecognition.start(); } catch(e){} }, 500);
  };
  try { wakeRecognition.start(); console.log('Wake word aktiv: Sag "Arcane"'); } catch(e){}
}

// Restart wake word after mic stops
const origToggle = toggleMic;

// Start wake word on page load
window.addEventListener('load', () => { setTimeout(startWakeWord, 1000); });
